# ============================================================
# Android + Windows 自动构建工作流
# 基于 GitHub Actions 官方文档标准模板
# 参考：https://docs.github.com/en/actions/building-and-testing-java-with-gradle
# ============================================================
name: Build & Release

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_DATE: ${{ steps.build-date.outputs.today }}
  FLUTTER_VERSION: '3.44'
  GRADLE_TIMEOUT: 600000

jobs:
  # ======================== Android ========================
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. 拉取代码
      - name: Checkout source
        uses: actions/checkout@v6

      # 2. 生成编译日期
      - name: Set build date
        id: build-date
        run: echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # 3. JDK 17 官方 v5（内置 Gradle 缓存）
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      # 4. Gradle 官方专用缓存
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 5. 安装 Android SDK
      - name: Install Android SDK
        uses: android-actions/setup-android@v4

      # 6. Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # 7. 创建 local.properties
      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      # 8. 密钥配置（可选）
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        if: ${{ secrets.KEYSTORE_PASSWORD != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties

      # 9. 构造占位音效文件
      - name: Create dummy sound files
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFFDUMMY" > "assets/sounds/${name}.wav"
          done

      # 10. Dart 依赖
      - name: Get dependencies
        run: flutter pub get

      # 11. 构建 split APK（重试 3 次防 Gradle 超时）
      - name: Build Release APK
        uses: nick-invision/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 40
          command: flutter build apk --release --split-per-abi --android-skip-build-dependency-validation

      # 12. 构建 AAB（Google Play 上架包）
      - name: Build Release AAB
        uses: nick-invision/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 40
          command: flutter build appbundle --release --android-skip-build-dependency-validation

      # 13. 上传产物（arm64-v8a）
      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-classroom-arm64-v8a-${{ env.BUILD_DATE }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: warn

      # 14. 上传产物（armeabi-v7a）
      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-classroom-armeabi-v7a-${{ env.BUILD_DATE }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          if-no-files-found: warn

      # 15. 上传产物（x86_64）
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-classroom-x86_64-${{ env.BUILD_DATE }}
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: warn

      # 16. 上传 AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: smart-classroom-aab-${{ env.BUILD_DATE }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

  # ======================== Windows ========================
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Recreate Windows project
        shell: pwsh
        run: |
          if (Test-Path windows) { Remove-Item -Recurse -Force windows }
          flutter create --platforms=windows --org=com.zhuomostudio --project-name=smart_classroom .

      - name: Create dummy sound files
        shell: bash
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFFDUMMY" > "assets/sounds/${name}.wav"
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        shell: pwsh
        run: |
          if (Test-Path build/windows) { Remove-Item -Recurse -Force build/windows }
          flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath smart-classroom-windows-${{ env.BUILD_DATE }}.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: smart-classroom-windows-${{ env.BUILD_DATE }}
          path: smart-classroom-windows-${{ env.BUILD_DATE }}.zip

  # ======================== GitHub Release ========================
  release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/smart-classroom-arm64-v8a-**/*.apk
            artifacts/smart-classroom-armeabi-v7a-**/*.apk
            artifacts/smart-classroom-x86_64-**/*.apk
            artifacts/smart-classroom-aab-**/*.aab
            artifacts/smart-classroom-windows-**/*.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties

      - name: Create dummy sound files
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFFDUMMY" > "assets/sounds/${name}.wav"
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release.apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release.apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-release.apk
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27'
          channel: 'stable'
          architecture: x64

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Recreate Windows project
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force windows -ErrorAction SilentlyContinue
          flutter create --platforms=windows --org=com.zhuomostudio --project-name=smart_classroom .
          (Get-Content windows/CMakeLists.txt) -replace 'cmake_minimum_required\(VERSION [0-9.]+\)', 'cmake_minimum_required(VERSION 3.20)' | Set-Content windows/CMakeLists.txt
          (Get-Content windows/runner/CMakeLists.txt) -replace 'cmake_minimum_required\(VERSION [0-9.]+\)', 'cmake_minimum_required(VERSION 3.20)' | Set-Content windows/runner/CMakeLists.txt

      - name: Create dummy sound files
        shell: bash
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFFDUMMY" > "assets/sounds/${name}.wav"
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Clean CMake cache
        shell: pwsh
        run: |
          if (Test-Path build/windows) {
            Remove-Item -Recurse -Force build/windows
            Write-Host "Cleaned build/windows CMake cache"
          }

      - name: Patch Flutter SDK (VS generator)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "$env:FLUTTER_ROOT" -Recurse -Filter "*.dart" | Select-String -Pattern "Visual Studio 16 2019" -List
          foreach ($f in $files) {
            Write-Host "Patching: $($f.Path)"
            (Get-Content $f.Path -Raw) -replace 'Visual Studio 16 2019', 'Visual Studio 18 2026' | Set-Content $f.Path -NoNewline
          }
          if (-not $files) { Write-Host "No Flutter SDK files needed patching" }

      - name: Build Windows
        shell: pwsh
        env:
          # windows-latest (2026-06) 仅含 VS 2026；若 CI 环境有 VS 2022 可改为 "Visual Studio 17 2022"
          CMAKE_GENERATOR: "Visual Studio 18 2026"
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath 2>$null
          if ($vsPath) {
            $env:Path = "$vsPath\Common7\IDE;$env:Path"
            Write-Host "Using VS from: $vsPath"
          }
          flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath smart_classroom_windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: smart_classroom_windows.zip
          path: smart_classroom_windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download arm64 APK
        uses: actions/download-artifact@v4
        with: { name: app-arm64-v8a-release.apk }
      - name: Download armeabi APK
        uses: actions/download-artifact@v4
        with: { name: app-armeabi-v7a-release.apk }
      - name: Download x86_64 APK
        uses: actions/download-artifact@v4
        with: { name: app-x86_64-release.apk }
      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with: { name: smart_classroom_windows.zip }
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-arm64-v8a-release.apk
            app-armeabi-v7a-release.apk
            app-x86_64-release.apk
            smart_classroom_windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties

      - name: Create dummy sound files
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFFDUMMY" > "assets/sounds/${name}.wav"
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release.apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release.apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-release.apk
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27'
          channel: 'stable'
          architecture: x64

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Create dummy sound files
        shell: bash
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFFDUMMY" > "assets/sounds/${name}.wav"
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (VS 2022)
        shell: pwsh
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1" -SkipAutomaticLocation
          flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath smart_classroom_windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: smart_classroom_windows.zip
          path: smart_classroom_windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download arm64 APK
        uses: actions/download-artifact@v4
        with: { name: app-arm64-v8a-release.apk }
      - name: Download armeabi APK
        uses: actions/download-artifact@v4
        with: { name: app-armeabi-v7a-release.apk }
      - name: Download x86_64 APK
        uses: actions/download-artifact@v4
        with: { name: app-x86_64-release.apk }
      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with: { name: smart_classroom_windows.zip }
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-arm64-v8a-release.apk
            app-armeabi-v7a-release.apk
            app-x86_64-release.apk
            smart_classroom_windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

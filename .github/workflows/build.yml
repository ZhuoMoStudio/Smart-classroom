# ============================================================
# Android + Windows CI Build Workflow
# 基于 GitHub Actions 官方文档标准模板
# 使用官方最新 Action 版本
# ============================================================
name: Build & Release

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  APP_NAME: SmartClassroom
  APP_VERSION: 2.0.0

jobs:
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=${{ env.APP_VERSION }}" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Clean stale build artifacts
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=1

      - name: Rename arm64 APK
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_arm64-v8a.apk
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_arm64-v8a.apk
          path: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_arm64-v8a.apk

      - name: Rename armeabi APK
        run: |
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_armeabi-v7a.apk
      - name: Upload armeabi APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_armeabi-v7a.apk
          path: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_armeabi-v7a.apk

      - name: Rename x86_64 APK
        run: |
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
             ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_x86_64.apk
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_x86_64.apk
          path: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_x86_64.apk

  build-windows:
    name: Windows Build
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'
          architecture: x64

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Recreate Windows project
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force windows -ErrorAction SilentlyContinue
          flutter create --platforms=windows --org=com.zhuomostudio --project-name=smart_classroom .

      - name: Set MSVC compatibility environment variable
        shell: pwsh
        run: |
          echo "CL=/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Set CL=/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        shell: pwsh
        run: flutter build windows --release

      - name: Package Windows ZIP with versioned name
        shell: pwsh
        run: |
          $zipName = "${env:APP_NAME}_v${env:APP_VERSION}_windows.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_windows.zip
          path: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
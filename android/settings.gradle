// 顶层获取 Flutter SDK 路径，供 pluginManagement 和 dependencyResolutionManagement 共用
def props = new Properties()
def propsFile = file("local.properties")
if (propsFile.exists()) {
    propsFile.withInputStream { props.load(it) }
}
def flutterSdkPath = props.getProperty("flutter.sdk")

pluginManagement {
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "9.0.0" apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        // Flutter 本地 Maven 仓库（per-ABI embedding artifacts）
        maven {
            url "$flutterSdkPath/bin/cache/artifacts/engine/android"
        }
    }
}

include ":app"

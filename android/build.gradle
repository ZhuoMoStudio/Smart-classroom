allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// 确保 Flutter 本地 Maven 仓库可用（embedding artifacts）
def flutterRoot = System.getenv('FLUTTER_ROOT')
if (flutterRoot == null) {
    def props = new Properties()
    def propsFile = file('local.properties')
    if (propsFile.exists()) {
        propsFile.withInputStream { props.load(it) }
        flutterRoot = props.getProperty('flutter.sdk')
    }
}
if (flutterRoot != null) {
    subprojects {
        repositories {
            google()
            mavenCentral()
            maven {
                url "$flutterRoot/bin/cache/artifacts/engine/android"
            }
        }
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

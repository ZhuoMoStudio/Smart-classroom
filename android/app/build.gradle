plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.zhuomostudio.smart_classroom"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.zhuomostudio.smart_classroom"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    splits {
        abi {
            enable true
            reset()
            include 'armeabi-v7a', 'arm64-v8a', 'x86_64'
            universalApk false
        }
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties.getProperty('keyAlias', '')
            keyPassword = keystoreProperties.getProperty('keyPassword', '')
            storeFile = keystoreProperties.getProperty('storeFile') ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties.getProperty('storePassword', '')
        }
    }

    buildTypes {
        release {
            signingConfig = (keystoreProperties.getProperty('keyAlias', null) != null)
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

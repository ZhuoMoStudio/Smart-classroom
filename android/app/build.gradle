plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.zhuomostudio.smart_classroom"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.zhuomostudio.smart_classroom"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    splits {
        abi {
            enable true
            reset()
            include 'armeabi-v7a', 'arm64-v8a', 'x86_64'
            universalApk false
        }
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties.getProperty('keyAlias', '')
            keyPassword = keystoreProperties.getProperty('keyPassword', '')
            storeFile = keystoreProperties.getProperty('storeFile') ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties.getProperty('storePassword', '')
        }
    }

    buildTypes {
        release {
            signingConfig = (keystoreProperties.getProperty('keyAlias', null) != null)
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

// 动态读取 Flutter engine 版本，用于兜底 embedding 依赖
def flutterSdkPath = localProperties.getProperty('flutter.sdk')
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv('FLUTTER_ROOT')
}
def engineVersionFile = file("$flutterSdkPath/bin/internal/engine.version")
def engineVersion = engineVersionFile.exists() ? engineVersionFile.text.trim() : null
def embeddingVersion = engineVersion != null ? "1.0.0-$engineVersion" : null

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.23"
    if (embeddingVersion != null) {
        releaseImplementation "io.flutter:flutter_embedding_release:$embeddingVersion"
        debugImplementation "io.flutter:flutter_embedding_debug:$embeddingVersion"
    }
}

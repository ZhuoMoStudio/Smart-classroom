name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'
          cache: true

      - name: Create dummy sound files
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFF$$" > "assets/sounds/${name}.wav"
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release.apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release.apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-release.apk
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'
          architecture: x64
      - name: Enable Windows
        run: flutter config --enable-windows-desktop
      - name: Create dummy sound files (bash)
        shell: bash
        run: |
          mkdir -p assets/sounds
          for name in click draw_start draw_roll draw_result timer_end score_up score_down add_member delete_member sync_complete sync_fail; do
            echo "RIFF$$" > "assets/sounds/${name}.wav"
          done
      - name: Get dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Package ZIP
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath smart_classroom_windows.zip
      - name: Upload Windows ZIP
        uses: actions with:
_classroom_windows:
: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
   : actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-arm64-v8a-release.apk/app-arm64-v8a-release.apk
            app-armeabi-v7a-release.apk/app-armeabi-v7a-release.apk
            app-x86_64-release.apk/app-x86_64-release.apk
            smart_classroom_windows.zip/smart_classroom_windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}